<!DOCTYPE html>
<html lang="en">
<head>
    <title>snes9x-FastLink v.0.2</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #contextMenu {
            display: none; position: absolute; z-index: 1000;
            background: #ccc; padding: 0; margin: 0; list-style: none;
        }
        #contextMenu li { cursor: pointer; padding: 5px; position: relative; }
        #contextMenu ul {
            display: none; position: absolute; left: 100%; top: 0;
            background: #ccc; padding: 5px; margin: 0; list-style: none; white-space: nowrap;
        }
        #contextMenu li:hover > ul { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <ul id="contextMenu">
        <li>View &#x25B8;<ul id="viewMenu"></ul></li>
        <li>Color &#x25B8;<ul id="colorMenu"></ul></li>
    </ul>
    <script>
    (function() {
        'use strict';
        const RAM_SIZE = 131072;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const menu = document.getElementById('contextMenu');

        // Reusable buffer - no allocation per frame
        let ramBuffer = new Uint8Array(RAM_SIZE);
        let imageData = null;
        let pixels = null;

        const state = JSON.parse(localStorage.getItem('fastlink_state')) || { color: 0 };
        const hues = [280, 0, 120, 240]; // purple, red, green, blue

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            imageData = ctx.createImageData(canvas.width, canvas.height);
            pixels = new Uint32Array(imageData.data.buffer);
        }

        function getColor32(value) {
            if (value === 0) return 0xFF000000; // black, fully opaque (ABGR)
            const l = 64 + (value * 0.5) | 0; // lightness 64-191
            const h = hues[state.color];
            // Fast HSL->RGB approximation for full saturation
            const c = l < 128 ? l : 255 - l;
            const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
            let r, g, b;
            if (h < 60)       { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else              { r = c; g = 0; b = x; }
            const m = l - c / 2;
            return 0xFF000000 | ((b + m) << 16) | ((g + m) << 8) | (r + m);
        }

        // Pre-compute color LUT for current hue
        let colorLUT = new Uint32Array(256);
        function rebuildLUT() {
            for (let i = 0; i < 256; i++) colorLUT[i] = getColor32(i);
        }
        rebuildLUT();

        function draw() {
            const w = canvas.width, h = canvas.height;
            const tilesX = Math.round(Math.sqrt(RAM_SIZE * (w / h)));
            const tileW = w / tilesX;
            const tilesY = Math.ceil(RAM_SIZE / tilesX);
            const tileH = h / tilesY;

            // Clear to black
            pixels.fill(0xFF000000);

            // Draw tiles using LUT
            for (let i = 0; i < RAM_SIZE; i++) {
                const color = colorLUT[ramBuffer[i]];
                const tx = (i % tilesX) * tileW | 0;
                const ty = (i / tilesX | 0) * tileH | 0;
                const tw = ((i % tilesX + 1) * tileW | 0) - tx;
                const th = (((i / tilesX | 0) + 1) * tileH | 0) - ty;
                for (let y = ty; y < ty + th && y < h; y++) {
                    const row = y * w;
                    for (let x = tx; x < tx + tw && x < w; x++) {
                        pixels[row + x] = color;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        async function fetchRAM() {
            try {
                const resp = await fetch('http://127.0.0.1:9000/');
                if (!resp.ok) throw new Error('fetch failed');
                const buf = await resp.arrayBuffer();
                // Copy into existing buffer (no new allocation)
                new Uint8Array(buf).forEach((v, i) => ramBuffer[i] = v);
            } catch (e) {
                // Demo: random data
                for (let i = 0; i < RAM_SIZE; i++) ramBuffer[i] = Math.random() * 256 | 0;
            }
            draw();
        }

        // Context menu
        canvas.oncontextmenu = e => {
            e.preventDefault();
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        };
        document.onclick = () => menu.style.display = 'none';

        function populateMenu(id, options, key) {
            const ul = document.getElementById(id);
            options.forEach((opt, i) => {
                const li = document.createElement('li');
                li.textContent = opt;
                li.onclick = () => {
                    state[key] = i;
                    localStorage.setItem('fastlink_state', JSON.stringify(state));
                    rebuildLUT();
                };
                ul.appendChild(li);
            });
        }
        populateMenu('viewMenu', ['RAM', 'SRAM', 'VRAM'], 'view');
        populateMenu('colorMenu', ['Purple', 'Red', 'Green', 'Blue'], 'color');

        // Init
        resize();
        window.onresize = () => { resize(); draw(); };

        ctx.font = '30px monospace';
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.fillText('SNES9X-FastLink', canvas.width / 2, canvas.height / 2);

        fetchRAM();
        setInterval(fetchRAM, 250);
    })();
    </script>
</body>
</html>
