<!DOCTYPE html>
<html lang="en">
<head>
    <title>snes9x-FastLink v.0.3</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0a0a0f; margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #contextMenu {
            display: none; position: absolute; z-index: 1000;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #4a4a6a; border-radius: 8px;
            padding: 4px 0; margin: 0; list-style: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            min-width: 160px;
        }
        #contextMenu li { 
            cursor: pointer; padding: 8px 16px; position: relative; 
            color: #e0e0ff; transition: background 0.15s;
        }
        #contextMenu li:hover { background: rgba(100, 100, 200, 0.3); }
        #contextMenu ul {
            display: none; position: absolute; left: 100%; top: -4px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #4a4a6a; border-radius: 8px;
            padding: 4px 0; margin: 0; list-style: none; white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #contextMenu li:hover > ul { display: block; }
        #hud {
            position: fixed; top: 10px; left: 10px; z-index: 100;
            color: #8888ff; font-size: 12px; font-family: monospace;
            text-shadow: 0 0 10px rgba(100,100,255,0.5);
            pointer-events: none;
        }
        #stats {
            position: fixed; bottom: 10px; right: 10px; z-index: 100;
            color: #666; font-size: 11px; font-family: monospace;
            text-align: right; pointer-events: none;
        }
        .legend {
            position: fixed; bottom: 10px; left: 10px; z-index: 100;
            display: flex; gap: 12px; font-size: 10px; font-family: monospace;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; color: #888; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="hud">SNES9X-FastLink v0.3<br><span id="viewLabel">WRAM 128KB</span></div>
    <div id="stats">
        <div>Changes: <span id="changeCount">0</span>/frame</div>
        <div>Hotspots: <span id="hotspotCount">0</span></div>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#6366f1"></div>Zero Page</div>
        <div class="legend-item"><div class="legend-color" style="background:#22d3ee"></div>Stack</div>
        <div class="legend-item"><div class="legend-color" style="background:#a855f7"></div>Game State</div>
        <div class="legend-item"><div class="legend-color" style="background:#f472b6"></div>Buffers</div>
        <div class="legend-item"><div class="legend-color" style="background:#fbbf24"></div>⚡ Changed</div>
    </div>
    <ul id="contextMenu">
        <li>View &#x25B8;<ul id="viewMenu"></ul></li>
        <li>Effects &#x25B8;<ul id="effectMenu"></ul></li>
        <li>Color Mode &#x25B8;<ul id="colorMenu"></ul></li>
    </ul>
    <script>
    (function() {
        'use strict';
        
        // === SNES Memory Sizes ===
        const MEM_SIZES = {
            wram: 131072,  // 128KB Work RAM
            vram: 65536,   // 64KB Video RAM  
            sram: 32768    // 32KB Save RAM (typical)
        };
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const menu = document.getElementById('contextMenu');

        // State with defaults
        const defaultState = { 
            colorMode: 0,      // 0=region, 1=purple, 2=heat, 3=rainbow
            effectMode: 1,     // 0=none, 1=glow, 2=particles, 3=wave
            view: 0            // 0=wram, 1=vram, 2=sram
        };
        const state = { ...defaultState, ...JSON.parse(localStorage.getItem('fastlink_state2') || '{}') };
        const saveState = () => localStorage.setItem('fastlink_state2', JSON.stringify(state));

        // Memory buffers
        let currentSize = MEM_SIZES.wram;
        let ramBuffer = new Uint8Array(currentSize);
        let prevBuffer = new Uint8Array(currentSize);
        let changeAge = new Float32Array(currentSize);  // Decay timer for change effects
        let heatmap = new Float32Array(currentSize);    // Long-term activity tracking
        
        let imageData = null;
        let pixels = null;
        let frameCount = 0;
        let lastChangeCount = 0;

        // === Particle System for Tetris-style Effects ===
        const MAX_PARTICLES = 500;
        const particles = [];
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = -Math.random() * 4 - 2;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = 2 + Math.random() * 3;
                this.color = color;
                this.gravity = 0.15;
            }
            
            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw(ctx) {
                const alpha = this.life * this.life; // Quadratic falloff
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.size * 2;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            }
        }
        
        function spawnParticles(x, y, color, count = 3) {
            for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // === SNES Memory Region Colors ===
        // Maps memory address to hue based on typical SNES usage
        function getRegionHue(address) {
            if (address < 0x100) return 230;        // Zero page - blue/indigo
            if (address < 0x200) return 190;        // Stack - cyan  
            if (address < 0x2000) return 280;       // Game variables - purple
            if (address < 0x4000) return 320;       // Sprite/object tables - pink
            if (address < 0x8000) return 45;        // Buffers - orange
            return 160;                              // Extended RAM - teal
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            imageData = ctx.createImageData(canvas.width, canvas.height);
            pixels = new Uint32Array(imageData.data.buffer);
        }

        // HSL to RGB (ABGR format for canvas)
        function hsl2rgb32(h, s, l, boost = 0) {
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
            const m = l - c / 2;
            let r, g, b;
            if (h < 60)       { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else              { r = c; g = 0; b = x; }
            // Add glow boost
            r = Math.min(255, ((r + m) * 255 + boost) | 0);
            g = Math.min(255, ((g + m) * 255 + boost) | 0);
            b = Math.min(255, ((b + m) * 255 + boost) | 0);
            return 0xFF000000 | (b << 16) | (g << 8) | r;
        }

        function getColor(value, address, age, heat) {
            if (value === 0 && age <= 0) return 0xFF0a0a0f; // Near-black background
            
            const baseL = 0.15 + (value / 255) * 0.45; // Lightness 15-60%
            let h, s = 0.8, l = baseL;
            
            switch (state.colorMode) {
                case 0: // Region-based (default)
                    h = getRegionHue(address);
                    break;
                case 1: // Classic purple
                    h = 280;
                    break;
                case 2: // Heatmap (activity-based)
                    h = 240 - heat * 180; // Blue -> Red based on activity
                    s = 0.9;
                    break;
                case 3: // Rainbow (value-based)
                    h = (value / 255) * 300;
                    break;
            }
            
            // Change effect: bright flash that fades
            let boost = 0;
            if (age > 0) {
                const flash = age * age; // Quadratic falloff
                l = Math.min(0.9, l + flash * 0.5);
                s = Math.max(0.3, s - flash * 0.3); // Desaturate toward white
                boost = flash * 150;
                // Shift toward yellow/white when changing
                h = h + (60 - h) * flash * 0.5;
            }
            
            return hsl2rgb32(h, s, l, boost);
        }

        // Build tile layout once per resize
        let tileLayout = { tilesX: 0, tilesY: 0, tileW: 0, tileH: 0 };
        
        function updateLayout() {
            const w = canvas.width, h = canvas.height;
            tileLayout.tilesX = Math.round(Math.sqrt(currentSize * (w / h)));
            tileLayout.tileW = w / tileLayout.tilesX;
            tileLayout.tilesY = Math.ceil(currentSize / tileLayout.tilesX);
            tileLayout.tileH = h / tileLayout.tilesY;
        }

        function draw() {
            const w = canvas.width, h = canvas.height;
            const { tilesX, tileW, tileH } = tileLayout;
            
            // Clear
            pixels.fill(0xFF0a0a0f);
            
            // Wave effect offset
            const waveTime = frameCount * 0.05;
            const useWave = state.effectMode === 3;

            // Draw tiles
            for (let i = 0; i < currentSize; i++) {
                const age = changeAge[i];
                const heat = Math.min(1, heatmap[i]);
                const color = getColor(ramBuffer[i], i, age, heat);
                
                let tx = (i % tilesX) * tileW | 0;
                let ty = (i / tilesX | 0) * tileH | 0;
                
                // Wave distortion effect
                if (useWave && age > 0) {
                    tx += Math.sin(waveTime + i * 0.01) * age * 3 | 0;
                    ty += Math.cos(waveTime + i * 0.01) * age * 2 | 0;
                }
                
                const tw = ((i % tilesX + 1) * tileW | 0) - ((i % tilesX) * tileW | 0);
                const th = (((i / tilesX | 0) + 1) * tileH | 0) - ((i / tilesX | 0) * tileH | 0);
                
                // Glow effect: expand slightly when changing
                const glowExpand = (state.effectMode === 1 && age > 0.5) ? 1 : 0;
                
                for (let py = ty - glowExpand; py < ty + th + glowExpand && py < h; py++) {
                    if (py < 0) continue;
                    const row = py * w;
                    for (let px = tx - glowExpand; px < tx + tw + glowExpand && px < w; px++) {
                        if (px < 0) continue;
                        pixels[row + px] = color;
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            
            // Draw particles on top (if particle mode)
            if (state.effectMode === 2 && particles.length > 0) {
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (!particles[i].update()) {
                        particles.splice(i, 1);
                    } else {
                        particles[i].draw(ctx);
                    }
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
            
            frameCount++;
        }

        function processChanges(newData) {
            let changes = 0;
            let hotspots = 0;
            const { tilesX, tileW, tileH } = tileLayout;
            
            for (let i = 0; i < currentSize; i++) {
                const newVal = newData[i];
                const oldVal = prevBuffer[i];
                
                if (newVal !== oldVal) {
                    changes++;
                    changeAge[i] = 1.0; // Full brightness
                    heatmap[i] = Math.min(1, heatmap[i] + 0.1); // Accumulate heat
                    
                    // Spawn particles for significant changes (particle mode)
                    if (state.effectMode === 2 && Math.abs(newVal - oldVal) > 20) {
                        const tx = (i % tilesX) * tileW + tileW/2;
                        const ty = (i / tilesX | 0) * tileH + tileH/2;
                        const hue = getRegionHue(i);
                        const color = `hsl(${hue}, 80%, 70%)`;
                        spawnParticles(tx, ty, color, Math.min(5, Math.abs(newVal - oldVal) / 30 | 0));
                    }
                } else {
                    // Decay change age
                    if (changeAge[i] > 0) {
                        changeAge[i] = Math.max(0, changeAge[i] - 0.15);
                    }
                    // Slow decay of heatmap
                    if (heatmap[i] > 0) {
                        heatmap[i] *= 0.995;
                    }
                }
                
                if (heatmap[i] > 0.3) hotspots++;
                prevBuffer[i] = newVal;
                ramBuffer[i] = newVal;
            }
            
            lastChangeCount = changes;
            document.getElementById('changeCount').textContent = changes.toLocaleString();
            document.getElementById('hotspotCount').textContent = hotspots.toLocaleString();
        }

        async function fetchRAM() {
            try {
                // TODO: Server endpoint should vary by view type
                const resp = await fetch('http://127.0.0.1:9000/');
                if (!resp.ok) throw new Error('fetch failed');
                const buf = await resp.arrayBuffer();
                const newData = new Uint8Array(buf);
                
                // Handle size change
                if (newData.length !== currentSize) {
                    currentSize = newData.length;
                    ramBuffer = new Uint8Array(currentSize);
                    prevBuffer = new Uint8Array(currentSize);
                    changeAge = new Float32Array(currentSize);
                    heatmap = new Float32Array(currentSize);
                    updateLayout();
                }
                
                processChanges(newData);
            } catch (e) {
                // Demo mode: simulate some changes
                const demoData = new Uint8Array(currentSize);
                for (let i = 0; i < currentSize; i++) {
                    // Mostly keep previous, some random changes
                    if (Math.random() < 0.001) {
                        demoData[i] = Math.random() * 256 | 0;
                    } else {
                        demoData[i] = ramBuffer[i];
                    }
                }
                processChanges(demoData);
            }
            draw();
        }

        // Context menu
        canvas.oncontextmenu = e => {
            e.preventDefault();
            menu.style.display = 'block';
            menu.style.left = Math.min(e.pageX, window.innerWidth - 200) + 'px';
            menu.style.top = Math.min(e.pageY, window.innerHeight - 150) + 'px';
        };
        document.onclick = () => menu.style.display = 'none';

        function populateMenu(id, options, key, labels) {
            const ul = document.getElementById(id);
            options.forEach((opt, i) => {
                const li = document.createElement('li');
                li.textContent = (state[key] === i ? '● ' : '○ ') + opt;
                li.onclick = () => {
                    state[key] = i;
                    saveState();
                    if (labels) {
                        document.getElementById('viewLabel').textContent = labels[i];
                    }
                    // Rebuild menu to show selection
                    ul.innerHTML = '';
                    populateMenu(id, options, key, labels);
                };
                ul.appendChild(li);
            });
        }
        
        const viewOptions = ['WRAM (128KB)', 'VRAM (64KB)', 'SRAM (32KB)'];
        const viewLabels = ['WRAM 128KB', 'VRAM 64KB', 'SRAM 32KB'];
        populateMenu('viewMenu', viewOptions, 'view', viewLabels);
        populateMenu('effectMenu', ['None', 'Glow', 'Particles', 'Wave'], 'effectMode');
        populateMenu('colorMenu', ['Region-Based', 'Classic Purple', 'Activity Heatmap', 'Rainbow'], 'colorMode');

        // Update view label
        document.getElementById('viewLabel').textContent = viewLabels[state.view] || viewLabels[0];

        // Init
        resize();
        updateLayout();
        window.onresize = () => { 
            resize(); 
            updateLayout();
            draw(); 
        };

        // Initial draw
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = 'bold 32px system-ui';
        ctx.fillStyle = '#6366f1';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#6366f1';
        ctx.shadowBlur = 20;
        ctx.fillText('SNES9X-FastLink', canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = '16px system-ui';
        ctx.fillStyle = '#888';
        ctx.shadowBlur = 0;
        ctx.fillText('Connecting to emulator...', canvas.width / 2, canvas.height / 2 + 20);

        let pollTimer = null;

        function getPollInterval() {
            if (document.hidden) return 2000;
            if (!document.hasFocus()) return 1000;
            return 250;
        }

        function schedulePolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
            }
            pollTimer = setInterval(fetchRAM, getPollInterval());
        }

        document.addEventListener('visibilitychange', schedulePolling);
        window.addEventListener('focus', schedulePolling);
        window.addEventListener('blur', schedulePolling);

        // Start polling
        fetchRAM();
        schedulePolling();
        
        // Animation loop for particle decay even without new data
        function animate() {
            if (state.effectMode === 2 && particles.length > 0) {
                draw();
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();
    </script>
</body>
</html>
